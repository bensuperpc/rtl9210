;**************************************************************
;Realtek RTL9210CN Configuration for Boot Drive Compatibility
;on internal USB Ports for Servers
;Description: This setup is aimed at lower end USB 3.0 write
;while maintaining stability. It's recommend for HPE and Dell
;internal server USB Ports. 
;**************************************************************
;=================Start Device Specific Configurations=========
VID = 0x0bda
PID = 0x9210
MANUFACTURE = "Realtek"
PRODUCT = "RTL9210CN"
SERIAL = "012345678921"
SCSI_PRODUCT = "RTL9210CN NVME  "
SCSI_VENDOR = "Realtek "
LED = 0x01
SUSPEND_LED_OFF = 0x03
FORCE_PCIE_QUIRK = 0x00042040
FAN = 0x00000101
;=================END Device Specific Configurations===========

;=================START Compatibility Settings=================

;====USB_SELF_PWR = 0x1=======
;Declares if the device is self powered or powered by USB Bus
;Hereby 0x1 declares that the device is fully powered via USB BUS.
;0x1 seems to be the default and can therefor be outcommented.
;USB_SELF_PWR = 0x1

;====Disconn_ForceUSB2========
;Allows the device to force USB, not advisable for boot drives 
;that experience high log writes as trim support is lost.
Disconn_ForceUSB2 = false

;====DISK_IPS_THRES===========
;Allows the controller to put the disk in sleep state
;Default is the device not switching off, therefor can be outcommented.
;DISK_IPS_THRES = n/a

;====DIS_SHOW_EMPTY_DISK======
;Found to accellerate also boot time on Servers during post
;and reduce boot time on HPE servers during phases 0032 / 0034 (USB Initialization)
DIS_SHOW_EMPTY_DISK = 0x01
;U2_MAXPWR and U3_MAXPWR sets the power value advertised to the USB controller,
;this value DOES NOT reflect the effective power consumption, but only
;informs the controller about possible maximum values.
;corrisponds to the mA value in HEX (which multiplied with 5v USB equals Watt)
U2_MAXPWR = 0xfa
U3_MAXPWR = 0x70
;====ASPMDIS=================
;Allows the drive to enter lower power states at the cost of increased latency,
;Does not affect power consumption under load, but only invocation power or sleep states
;Not desired for O/S drives and therefor outcommented.
;ASPMDIS = 0x0
;====LATE_INIT_DISK==========
;Forces the controller to intialize the disk after fully intialising the controller
;avoiding power consumption peaks and full intialisation by UEFI and GRUB during boot
;Significantly reduces problems during post as situations presented in which O/S started to boot before 
;the controller was fully initialized avoiding also blocks during post phase 0032 / 0034 (USB Initialization).
LATE_INIT_DISK : 0x1
;=================END Compatibility Settings==================
;=================Tool Configure=================
;DISCONN_FORCE_USB2 = n
;FORMAT_DISK = n
;INC_SERIAL = y

;PARTITION: GPT, MBR
PARTITION = "MBR"
;FORMAT: NTFS, exFAT
FORMAT = "NTFS"
;LABEL max allowed - characters
LABEL = "My USB"
