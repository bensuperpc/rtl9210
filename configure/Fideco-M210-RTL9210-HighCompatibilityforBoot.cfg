;**************************************************************
;Realtek RTL9210CN Configuration for Boot Drive Compatibility
;on internal USB Ports for Servers
;Description: This setup is aimed at lower end USB 3.0 write
;while maintaining stability. It's recommend for HPE and Dell
;internal server USB Port. 
;**************************************************************
VID = 0x0bda
PID = 0x9210
MANUFACTURE = "Realtek"
PRODUCT = "RTL9210CN"
SERIAL = "012345678921"
SCSI_PRODUCT = "RTL9210CN NVME  "
SCSI_VENDOR = "Realtek "
USB_SELF_PWR = 0x01
LED = 0x01
SUSPEND_LED_OFF = 0x03
FORCE_PCIE_QUIRK = 0x00042040
FAN = 0x00000101
DIS_SHOW_EMPTY_DISK = 0x01
Disconn_ForceUSB2 = false

; Enable trim and Discard for Linux
; Might not be suitable for NVME Drives but only for Sata

; DISK_IPS_THRES makes the disk sleep after inactivity
; DISK_IPS_THRES = n/a

; U2_MAXPWR sets max. Power to 2.5w (standard limit on internal ports) for USB 2.0,
; probably not feasible for PCIe, but sufficient for SATA.
U2_MAXPWR = 0xfa
; U3_MAXPWR sets max. Power to 4.5w (standard limit on internal ports), 
; should be sufficient for NVME.
U3_MAXPWR = 0x70
; Allows the drive to enter lower power states at the cost of increased latency
; ASPMDIS = 0x0

;=================Tool Configure=================
;DISCONN_FORCE_USB2 = n
;FORMAT_DISK = n
;INC_SERIAL = y

;PARTITION: GPT, MBR
PARTITION = "MBR"
;FORMAT: NTFS, exFAT
FORMAT = "NTFS"
;LABEL max allowed - characters
LABEL = "My USB"